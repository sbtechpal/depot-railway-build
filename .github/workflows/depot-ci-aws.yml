# Depot CI → AWS ECS Deployment
# Demonstrates Depot CI's capabilities with Amazon ECS

name: Build & Deploy to AWS ECS (Depot CI)

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: depot-demo-cluster
  ECS_SERVICE: openclaw-demo
  ECS_TASK_DEFINITION: openclaw-demo-task
  DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}
  CONTAINER_NAME: openclaw-demo

jobs:
  depot-build:
    name: Build with Depot CI
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Depot CLI
        run: |
          curl -L https://depot.dev/install-cli.sh | sh
          echo "$HOME/.depot/bin" >> $GITHUB_PATH

      - name: Authenticate with Depot
        run: depot login --token ${{ secrets.DEPOT_TOKEN }}

      - name: Build with Depot CI
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: openclaw-demo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd sample-app
          depot build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          depot push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Run tests
        run: |
          cd sample-app
          depot run -- npm test

      - name: Build TypeScript
        run: |
          cd sample-app
          depot run -- npm run build

  deploy-ecs:
    name: Deploy to Amazon ECS
    runs-on: ubuntu-latest
    needs: depot-build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update ECS task definition
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: openclaw-demo
          IMAGE_TAG: ${{ github.sha }}
          TASK_DEFINITION: ${{ env.ECS_TASK_DEFINITION }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $TASK_DEFINITION \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --family $TASK_DEFINITION

      - name: Deploy to ECS
        env:
          CLUSTER: ${{ env.ECS_CLUSTER }}
          SERVICE: ${{ env.ECS_SERVICE }}
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --task-definition $TASK_DEFINITION \
            --force-new-deployment

      - name: Wait for deployment
        env:
          CLUSTER: ${{ env.ECS_CLUSTER }}
          SERVICE: ${{ env.ECS_SERVICE }}
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE

      - name: Get service URL
        env:
          CLUSTER: ${{ env.ECS_CLUSTER }}
          SERVICE: ${{ env.ECS_SERVICE }}
        run: |
          aws ecs describe-services \
            --cluster $CLUSTER \
            --services $SERVICE \
            --query 'services[0].deployments[0].loadBalancers[0].targetGroupArn' \
            --output text

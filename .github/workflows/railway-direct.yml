# Flow 3: GitHub Actions → Railway (Baseline)
# This workflow represents the traditional CI/CD approach
# Used as a baseline to compare against Depot CI performance

name: Build & Deploy to Railway (Baseline)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          npm ci
          echo "::endgroup::"

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build application
        run: |
          echo "::group::Building application"
          npm run build
          echo "::endgroup::"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sample-app/dist
          retention-days: 1

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: sample-app/dist

      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::group::Deploying to Railway"
          cd sample-app
          railway up --service ${{ env.RAILWAY_SERVICE_ID }}
          echo "::endgroup::"

      - name: Get deployment URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway domain --service ${{ env.RAILWAY_SERVICE_ID }}

  benchmark:
    name: Record Metrics
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Calculate workflow duration
        run: |
          START_TIME="${{ github.event.workflow_run.created_at }}"
          echo "Workflow started: $START_TIME"
          echo "This metrics collection would be enhanced with Depot CI"

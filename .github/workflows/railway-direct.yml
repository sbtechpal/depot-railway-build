# Flow 3: GitHub Actions → Railway (Baseline)
# This workflow represents the traditional CI/CD approach
# Builds Docker image in GitHub Actions, then deploys to Railway
# Used as a baseline to compare against Depot CI performance

name: Build & Deploy to Railway (Baseline)

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deployment to Railway'
        required: false
        type: boolean
        default: false
      debug_enabled:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '18'
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
  # Railway's internal registry for storing images
  RAILWAY_REGISTRY: production-us-east4-eqdc4a.railway-registry.com

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Railway Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.RAILWAY_REGISTRY }}
          username: railway
          password: ${{ secrets.RAILWAY_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./sample-app
          push: true
          tags: ${{ env.RAILWAY_REGISTRY }}/${{ env.RAILWAY_PROJECT_ID }}/${{ env.RAILWAY_SERVICE_ID }}:latest
          tags: ${{ env.RAILWAY_REGISTRY }}/${{ env.RAILWAY_PROJECT_ID }}/${{ env.RAILWAY_SERVICE_ID }}:${{ github.sha }}
          cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          annotations: |
            manifest:description:Built with GitHub Actions

      - name: Run tests in Docker image
        run: |
          docker run --rm ${{ env.RAILWAY_REGISTRY }}/${{ env.RAILWAY_PROJECT_ID }}/${{ env.RAILWAY_SERVICE_ID }}:${{ github.sha }} npm test

      - name: Image digest
        run: echo "Image built with digest ${{ steps.build.outputs.digest }}"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: inputs.skip_deploy != true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy pre-built image to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          IMAGE: ${{ env.RAILWAY_REGISTRY }}/${{ env.RAILWAY_PROJECT_ID }}/${{ env.RAILWAY_SERVICE_ID }}:${{ github.sha }}
        run: |
          echo "::group::Deploying pre-built Docker image to Railway"
          echo "Image: $IMAGE"
          cd sample-app
          # Use the pre-built image instead of rebuilding
          railway up --service ${{ env.RAILWAY_SERVICE_ID }} --image $IMAGE
          echo "::endgroup::"

      - name: Verify deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deployment URL:"
          railway domain --service ${{ env.RAILWAY_SERVICE_ID }}

  benchmark:
    name: Record Metrics
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Calculate workflow duration
        run: |
          echo "📊 GitHub Actions Baseline Metrics"
          echo "===================================="
          echo "Build job: ${{ needs.build.result }}"
          echo "Deploy job: ${{ needs.deploy.result }}"
          echo ""
          echo "🐌 Traditional CI:"
          echo "   - Docker build on ubuntu-latest"
          echo "   - GitHub Actions cache (layer caching)"
          echo "   - Manual Railway registry login"
          echo ""
          echo "⚡ Compare with Depot CI for 5-10x speedup"

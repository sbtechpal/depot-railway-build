# Depot CI → Azure Container Instances Deployment
# Demonstrates Depot CI's capabilities with Microsoft Azure

name: Build & Deploy to Azure ACI (Depot CI)

on:
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: depot-demo-rg
  AZURE_CONTAINER_GROUP: openclaw-demo
  AZURE_LOCATION: eastus
  DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}

jobs:
  depot-build:
    name: Build with Depot CI
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Depot CLI
        run: |
          curl -L https://depot.dev/install-cli.sh | sh
          echo "$HOME/.depot/bin" >> $GITHUB_PATH

      - name: Authenticate with Depot
        run: depot login --token ${{ secrets.DEPOT_TOKEN }}

      - name: Build with Depot CI
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          IMAGE: ${{ secrets.ACR_REGISTRY }}/openclaw-demo:${{ github.sha }}
        run: |
          cd sample-app
          depot build -t $IMAGE .
          depot push $IMAGE

      - name: Run tests
        run: |
          cd sample-app
          depot run -- npm test

      - name: Build TypeScript
        run: |
          cd sample-app
          depot run -- npm run build

  deploy-aci:
    name: Deploy to Azure Container Instances
    runs-on: ubuntu-latest
    needs: depot-build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to ACI
        env:
          RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          CONTAINER_GROUP: ${{ env.AZURE_CONTAINER_GROUP }}
          LOCATION: ${{ env.AZURE_LOCATION }}
          IMAGE: ${{ secrets.ACR_REGISTRY }}/openclaw-demo:${{ github.sha }}
        run: |
          az container create \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_GROUP \
            --image $IMAGE \
            --location $LOCATION \
            --ports 3000 \
            --cpu 1 \
            --memory 1 \
            --environment-variables NODE_ENV=production \
            --restart-policy Always

      - name: Get container IP
        env:
          RESOURCE_GROUP: ${{ env.AZURE_RESOURCE_GROUP }}
          CONTAINER_GROUP: ${{ env.AZURE_CONTAINER_GROUP }}
        run: |
          az container show \
            --resource-group $RESOURCE_GROUP \
            --name $CONTAINER_GROUP \
            --query ipAddress.ip \
            --output tsv

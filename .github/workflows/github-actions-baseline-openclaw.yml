name: GitHub Actions Baseline - OpenClaw Performance Test

on:
  workflow_dispatch:
    inputs:
      test_case:
        description: 'Performance test case'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - test-2-docs
          - test-3-source
          - test-4-ui
          - test-5-dependency
          - test-6-major

permissions:
  contents: read
  actions: write

jobs:
  github-actions-build:
    name: GitHub Actions Build - OpenClaw (Baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout OpenClaw
        uses: actions/checkout@v4
        with:
          repository: openclaw/openclaw
          ref: f0c970fb43

      - name: Checkout test scripts
        uses: actions/checkout@v4
        with:
          path: _test-scripts

      - name: Apply test case
        run: _test-scripts/scripts/apply-openclaw-test-case.sh "${{ github.event.inputs.test_case }}"

      - name: Display test info
        run: |
          echo "=========================================="
          echo "GitHub Actions Baseline - OpenClaw"
          echo "=========================================="
          echo "Test Case: ${{ github.event.inputs.test_case }}"
          echo "Description: ${{ env.test_description }}"
          echo "Expected Cache Hit: ${{ env.expected_cache }}"
          echo "=========================================="

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Record build start time
        run: echo "build_start=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build with GitHub Actions (Docker Buildx)
        run: |
          echo "Starting GitHub Actions Docker build..."
          echo "Test: ${{ github.event.inputs.test_case }}"
          docker buildx build \
            --load \
            -t openclaw:gha-test-${{ github.event.inputs.test_case }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --progress=plain \
            .

      - name: Display build results
        run: |
          echo "=========================================="
          echo "Build Complete!"
          echo "=========================================="
          echo "Image: openclaw:gha-test-${{ github.event.inputs.test_case }}"
          echo "Test Case: ${{ github.event.inputs.test_case }}"
          echo "Description: ${{ env.test_description }}"
          echo "Expected Cache: ${{ env.expected_cache }}"
          echo "=========================================="

      - name: Show image size
        run: |
          docker images openclaw:gha-test-${{ github.event.inputs.test_case }}

      - name: Record build timing
        if: always()
        run: |
          build_end=$(date +%s)
          duration=$((build_end - build_start))
          echo "=========================================="
          echo "Build Timing: ${duration}s"
          echo "Test Case: ${{ github.event.inputs.test_case }}"
          echo "Description: ${{ env.test_description }}"
          echo "Expected Cache: ${{ env.expected_cache }}"
          echo "=========================================="

# Depot CI → Google Cloud Run Deployment
# Demonstrates Depot CI's capabilities with Google Cloud Run

name: Build & Deploy to GCP Cloud Run (Depot CI)

on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: openclaw-demo
  DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}

jobs:
  depot-build:
    name: Build with Depot CI
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Set up Depot CLI
        run: |
          curl -L https://depot.dev/install-cli.sh | sh
          echo "$HOME/.depot/bin" >> $GITHUB_PATH

      - name: Authenticate with Depot
        run: depot login --token ${{ secrets.DEPOT_TOKEN }}

      - name: Build with Depot CI
        env:
          IMAGE: gcr.io/${{ env.GCP_PROJECT_ID }}/openclaw-demo:${{ github.sha }}
        run: |
          cd sample-app
          depot build -t $IMAGE .
          depot push $IMAGE

      - name: Run tests
        run: |
          cd sample-app
          depot run -- npm test

      - name: Build TypeScript
        run: |
          cd sample-app
          depot run -- npm run build

  deploy-cloudrun:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    needs: depot-build
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        env:
          IMAGE: gcr.io/${{ env.GCP_PROJECT_ID }}/openclaw-demo:${{ github.sha }}
          REGION: ${{ env.GCP_REGION }}
          SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars NODE_ENV=production

      - name: Get service URL
        env:
          REGION: ${{ env.GCP_REGION }}
          SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
        run: |
          gcloud run services describe $SERVICE \
            --region $REGION \
            --format 'value(status.url)'

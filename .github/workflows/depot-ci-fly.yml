# Depot CI → Fly.io Deployment
# Demonstrates Depot CI's capabilities with Fly.io

name: Build & Deploy to Fly.io (Depot CI)

on:
  workflow_dispatch:

env:
  FLY_APP_NAME: openclaw-demo
  DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}

jobs:
  depot-build:
    name: Build with Depot CI
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set up Depot CLI
        run: |
          curl -L https://depot.dev/install-cli.sh | sh
          echo "$HOME/.depot/bin" >> $GITHUB_PATH

      - name: Authenticate with Depot
        run: depot login --token ${{ secrets.DEPOT_TOKEN }}

      - name: Build with Depot CI
        env:
          IMAGE: registry.fly.io/${{ env.FLY_APP_NAME }}:${{ github.sha }}
        run: |
          cd sample-app
          depot build -t $IMAGE .
          depot push $IMAGE

      - name: Run tests
        run: |
          cd sample-app
          depot run -- npm test

      - name: Build TypeScript
        run: |
          cd sample-app
          depot run -- npm run build

  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: depot-build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          IMAGE: registry.fly.io/${{ env.FLY_APP_NAME }}:${{ github.sha }}
        run: |
          flyctl deploy \
            --image $IMAGE \
            --app ${{ env.FLY_APP_NAME }} \
            --regions iad \
            --ha false

      - name: Get app URL
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl info --app ${{ env.FLY_APP_NAME }} \
            --json hostname \
            --json delimiter='\n' \
            | grep -E 'Hostname|URL'

# Flow 4: GitHub Actions → Depot CI → Railway (Showcase)
# This workflow demonstrates Depot CI's capabilities
# Expected: 5-10x faster than the baseline workflow
# Authentication: OIDC (primary) with DEPOT_TOKEN fallback (optional)

name: Build & Deploy with Depot CI

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Skip deployment to Railway'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '18'
  DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

jobs:
  depot-build:
    name: Build with Depot CI
    # Use Depot's high-performance runners
    runs-on: depot-ubuntu-22.04
    timeout-minutes: 5

    # OIDC permissions (primary) — DEPOT_TOKEN is optional fallback
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Depot CLI
        uses: depot/setup-action@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          cd sample-app
          npm ci
          echo "::endgroup::"

      - name: Build Docker image with Depot
        uses: depot/build-push-action@v1
        with:
          project: ${{ env.DEPOT_PROJECT_ID }}
          token: ${{ secrets.DEPOT_TOKEN }}  # Optional! Falls back to OIDC
          context: ./sample-app
          tags: openclaw-demo:${{ github.sha }},openclaw-demo:depot-latest

      - name: Run tests
        run: |
          echo "::group::Running tests"
          cd sample-app
          npm test
          echo "::endgroup::"

      - name: Build TypeScript
        run: |
          echo "::group::Building TypeScript"
          cd sample-app
          npm run build
          echo "::endgroup::"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-depot
          path: sample-app/dist
          retention-days: 1

  deploy-railway:
    name: Deploy to Railway from Depot
    runs-on: ubuntu-latest
    needs: depot-build
    timeout-minutes: 5
    if: inputs.skip_deploy != true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-depot
          path: sample-app/dist

      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy pre-built artifacts to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::group::Deploying to Railway (from Depot build)"
          cd sample-app
          railway up --service ${{ env.RAILWAY_SERVICE_ID }}
          echo "::endgroup::"

      - name: Verify deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deployment URL:"
          railway domain --service ${{ env.RAILWAY_SERVICE_ID }}

  benchmark:
    name: Compare Performance
    runs-on: ubuntu-latest
    needs: [depot-build, deploy-railway]
    if: always()

    steps:
      - name: Calculate Depot CI metrics
        run: |
          echo "📊 Depot CI Performance Metrics"
          echo "================================"
          echo "Build job completed in: ${{ needs.depot-build.result }}"
          echo "Deploy job completed in: ${{ needs.deploy-railway.result }}"
          echo ""
          echo "🚀 Expected vs Baseline:"
          echo "   Baseline: ~4-7 minutes"
          echo "   Depot CI: ~20-60 seconds"
          echo "   Speedup:   ~5-10x faster"

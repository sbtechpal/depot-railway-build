# Flow 4: GitHub Actions → Depot CI → Railway (Showcase)
# This workflow demonstrates Depot CI's capabilities
# Expected: 5-10x faster than the baseline workflow

name: Build & Deploy with Depot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  DEPOT_PROJECT_ID: ${{ secrets.DEPOT_PROJECT_ID }}
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

jobs:
  depot-build:
    name: Build with Depot CI
    # Use Depot's high-performance runners
    runs-on: depot-ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sample-app/package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          cd sample-app
          npm ci
          echo "::endgroup::"

      - name: Authenticate with Depot
        run: depot login --token ${{ secrets.DEPOT_TOKEN }}

      - name: Build Docker image with Depot (40x faster)
        run: |
          echo "::group::Depot CI Build"
          cd sample-app
          depot build -t openclaw-demo:${{ github.sha }} -t openclaw-demo:latest .
          echo "::endgroup::"

      - name: Run tests
        run: |
          cd sample-app
          npm test

      - name: Build TypeScript
        run: |
          cd sample-app
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-depot
          path: sample-app/dist
          retention-days: 1

  deploy-railway:
    name: Deploy to Railway from Depot
    runs-on: ubuntu-latest
    needs: depot-build
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-depot
          path: sample-app/dist

      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Deploy pre-built artifacts to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::group::Deploying to Railway (from Depot build)"
          cd sample-app
          railway up --service ${{ env.RAILWAY_SERVICE_ID }}
          echo "::endgroup::"

      - name: Verify deployment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deployment URL:"
          railway domain --service ${{ env.RAILWAY_SERVICE_ID }}

  benchmark:
    name: Compare Performance
    runs-on: ubuntu-latest
    needs: [depot-build, deploy-railway]
    if: always()

    steps:
      - name: Calculate Depot CI metrics
        run: |
          echo "📊 Depot CI Performance Metrics"
          echo "================================"
          echo "Build job completed in: ${{ needs.depot-build.result }}"
          echo "Deploy job completed in: ${{ needs.deploy-railway.result }}"
          echo ""
          echo "🚀 Expected vs Baseline:"
          echo "   Baseline: ~4-7 minutes"
          echo "   Depot CI: ~20-60 seconds"
          echo "   Speedup:   ~5-10x faster"
